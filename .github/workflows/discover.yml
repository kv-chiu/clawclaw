name: Discover New Projects

on:
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install tokei
        run: |
          curl -fsSL https://github.com/XAMPPRocky/tokei/releases/download/v12.1.2/tokei-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv tokei /usr/local/bin/

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -oP '"tag_name":\s*"v\K[^"]+')
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Discover new projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_EXTRA_PARAMS: ${{ vars.AI_EXTRA_PARAMS }}
          MAX_COLLECT_PER_RUN: ${{ vars.MAX_COLLECT_PER_RUN }}
        run: |
          pnpm start discover || true
          pnpm start render

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/ README.md && exit 0
          BRANCH="auto/discover-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add data/projects.json data/queue.json README.md
          git commit -m "feat: discover new projects $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "feat: discover new projects $(date +%Y-%m-%d)" \
            --body "Automated weekly discovery of new OpenClaw-inspired projects." \
            --base main || true
